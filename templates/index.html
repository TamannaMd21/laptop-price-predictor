<!DOCTYPE html>
<html>
<head>
    <title>Laptop Price Predictor</title>
    <style>
        body {
            font-family: Arial;
            background: #f5f5f5;
            text-align: center;
        }
        form {
            background: white;
            padding: 20px;
            margin: 50px auto;
            width: 300px;
            border-radius: 10px;
        }
        input, select {
            width: 90%;
            padding: 8px;
            margin: 10px;
        }
        button {
            padding: 10px 20px;
            background: blue;
            color: white;
            border: none;
            border-radius: 5px;
        }
    </style>
</head>
<body>

<h2>💻 Laptop Price Predictor</h2>

<form>
    <label>RAM (GB)</label>
    <select>
        <option>4</option>
        <option>8</option>
        <option>16</option>
        <option>32</option>
    </select>

    <label>Weight</label>
    <input type="number" step="0.1">

    <label>Screen Size</label>
    <input type="number" step="0.1">

    <label>PPI</label>
    <input type="number">

    <button type="submit">Predict</button>
</form>

</body>
</html>
